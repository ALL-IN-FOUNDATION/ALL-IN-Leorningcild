name = "allin-copytrade-worker"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers free tier is enough for this
# Upgrade to Paid if you need more than 100k req/day

[vars]
# Set ALLOWED_ORIGIN in Cloudflare dashboard → Workers → Settings → Variables
# Example: https://allin-leorningcild.pages.dev
ALLOWED_ORIGIN = "*"

# WebSocket support — required for wallet monitoring
[limits]
cpu_ms = 50

# Durable Objects NOT needed — we use stateless WS bridging
# Each WebSocket connection is handled in a single isolate

[[rules]]
type = "ESModule"
globs = ["**/*.js"]
